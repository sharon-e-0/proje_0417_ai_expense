<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 영수증 가계부</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=AI&background=4F46E5&color=fff&size=192">
    <!-- Tailwind CSS & Supabase -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        .upload-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%236366F1FF' stroke-width='4' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 16px;
        }
        
        /* Custom Scrollbar for results if needed */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7d2fe;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #818cf8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen p-4 md:p-8 text-gray-800 antialiased selection:bg-indigo-200">
    
    <div class="max-w-4xl mx-auto space-y-8 pb-12">
        
        <!-- Header -->
        <header class="text-center pt-8 pb-4">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-3 tracking-tight">
                AI 영수증 가계부
            </h1>
            <p class="text-gray-500 font-medium">영수증 이미지를 업로드하면 AI가 지출 내역을 식별하고 정리해줍니다.</p>
        </header>

        <!-- API Key Section -->
        <section class="glass-card p-6 md:p-8 rounded-2xl transition-all hover:shadow-lg">
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full relative">
                    <label for="apiKey" class="block text-sm font-semibold text-gray-700 mb-2 pl-1">
                        OpenAI API 키 설정
                        <span class="text-xs font-normal text-gray-400 ml-2">분석을 위해 필요합니다 (브라우저에만 저장됨)</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                            </svg>
                        </div>
                        <input type="password" id="apiKey" class="w-full pl-10 pr-4 py-3 bg-white/70 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition-all text-sm outline-none" placeholder="sk-...">
                    </div>
                </div>
                <button id="saveKeyBtn" class="w-full md:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl shadow-md hover:shadow-indigo-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    키 저장
                </button>
            </div>
            <div id="keyStatusContainer" class="mt-3 opacity-0 transition-opacity duration-300">
                <p id="keyStatusMessage" class="text-sm text-emerald-600 font-medium flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    API 키가 기기에 안전하게 저장되었습니다.
                </p>
            </div>
        </section>

        <!-- Upload Section -->
        <section class="glass-card rounded-2xl w-full p-2">
            <div id="dropZone" class="upload-dashed w-full p-8 md:p-16 text-center cursor-pointer bg-indigo-50/30 hover:bg-indigo-50/80 transition-colors flex flex-col items-center justify-center relative overflow-hidden group min-h-[320px]">
                <input type="file" id="receiptImage" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                
                <!-- Initial Prompt -->
                <div id="uploadPrompt" class="flex flex-col items-center pointer-events-none transition-transform duration-300 group-hover:-translate-y-2">
                    <div class="w-20 h-20 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300 shadow-inner">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-indigo-900">영수증 이미지 선택</span>
                    <span class="text-sm font-medium text-gray-500 mt-2 bg-white/50 px-4 py-1 rounded-full">클릭하거나 여기로 이미지를 드래그하세요</span>
                </div>
                
                <!-- Image Preview Modal -->
                <div id="imagePreviewContainer" class="hidden absolute inset-2 bg-white/90 backdrop-blur-sm rounded-xl z-10 flex items-center justify-center pointer-events-none shadow-sm">
                    <img id="imagePreview" src="" alt="영수증 미리보기" class="max-w-full max-h-[290px] object-contain rounded-lg shadow-md border border-gray-100">
                    <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-xl duration-300">
                        <span class="bg-indigo-600 text-white px-5 py-2 rounded-full font-medium shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                            다른 이미지로 변경
                        </span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Analysis Loader (Hidden by default) -->
        <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-8">
            <div class="relative w-16 h-16">
                <div class="absolute inset-0 rounded-full border-t-2 border-indigo-600 animate-spin"></div>
                <div class="absolute inset-2 rounded-full border-r-2 border-purple-500 animate-[spin_1.5s_linear_infinite]"></div>
            </div>
            <p class="mt-4 text-indigo-800 font-medium animate-pulse">AI가 영수증을 꼼꼼하게 분석하고 있습니다...</p>
        </div>

        <!-- Expense Cards Container -->
        <section class="space-y-6 pt-4">
            <div class="flex items-center justify-between border-b border-indigo-100 pb-3">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                    분석된 지출 내역
                </h2>
                <span class="text-sm font-medium text-purple-600 bg-purple-100 px-3 py-1 rounded-full" id="itemCount">총 0건</span>
            </div>

            <!-- Dynamic Grid for Cards -->
            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data will be populated here. Showing a 'Empty state' or 'Example state' below -->
                
                <!-- Example Mockup (Hidden or used as placeholder) -->
                <div id="emptyState" class="col-span-full py-16 text-center flex flex-col items-center justify-center text-gray-400 bg-white/40 rounded-2xl border border-dashed border-gray-300">
                    <svg class="w-16 h-16 text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                    </svg>
                    <p class="font-medium">업로드된 영수증이 없습니다.</p>
                    <p class="text-sm mt-1">영수증을 선택하면 자동으로 분석 결과가 여기에 표시됩니다.</p>
                </div>
            </div>
            
            <!-- Template to clone for actual results in Javascript -->
            <template id="cardTemplate">
                <div class="glass-card p-0 rounded-2xl overflow-hidden hover:-translate-y-1 transition-transform duration-300 group">
                    <div class="h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg text-gray-800 line-clamp-1 template-shop-name">상호명</h3>
                            <span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-md border border-indigo-100 template-category">카테고리</span>
                        </div>
                        <p class="text-xs text-gray-500 mb-5 template-date flex items-center gap-1">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            2026-04-17 (예시)
                        </p>
                        
                        <div class="space-y-2 mb-5 text-sm text-gray-600 template-items max-h-32 overflow-y-auto pr-1">
                            <!-- Items go here -->
                        </div>
                        
                        <div class="pt-4 border-t border-gray-100 flex justify-between items-end">
                            <span class="text-sm font-medium text-gray-500">총 결제액</span>
                            <span class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-700 template-total">0원</span>
                        </div>
                    </div>
                </div>
            </template>
        </section>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://ssxeqpmbefehsqcgpxku.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeGVxcG1iZWZlaHNxY2dweGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTEwNDUsImV4cCI6MjA5MDc4NzA0NX0.a7Ne-pP1cc_v4X6hrnbJOXjnplgm6IyuVZfBPqPQx0c';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            const apiKeyInput = document.getElementById('apiKey');
            const saveKeyBtn = document.getElementById('saveKeyBtn');
            const keyStatusContainer = document.getElementById('keyStatusContainer');
            
            const receiptImageInput = document.getElementById('receiptImage');
            const uploadPrompt = document.getElementById('uploadPrompt');
            const imagePreviewContainer = document.getElementById('imagePreviewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const dropZone = document.getElementById('dropZone');

            // 1. Load saved API key
            const savedKey = localStorage.getItem('openai_api_key_receipt');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }

            // Fetch expenses on initialization
            fetchExpenses();

            // 2. Save Key Logic
            saveKeyBtn.addEventListener('click', () => {
                const key = apiKeyInput.value.trim();
                if (key) {
                    localStorage.setItem('openai_api_key_receipt', key);
                    
                    // Show success message with fade
                    keyStatusContainer.classList.remove('opacity-0');
                    setTimeout(() => {
                        keyStatusContainer.classList.add('opacity-0');
                    }, 3500);
                } else {
                    alert('API 키를 올바르게 입력해주세요.');
                    apiKeyInput.focus();
                }
            });

            // 3. Image Upload & Preview Logic
            receiptImageInput.addEventListener('change', handleFileSelect);

            function handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        imagePreview.src = event.target.result;
                        uploadPrompt.classList.add('hidden');
                        imagePreviewContainer.classList.remove('hidden');
                        
                        analyzeReceipt(event.target.result);
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('이미지 파일만 업로드 가능합니다.');
                }
            }

            // Drag and Drop styling
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });

            function highlight(e) {
                dropZone.classList.add('bg-indigo-100/80');
            }

            function unhighlight(e) {
                dropZone.classList.remove('bg-indigo-100/80');
            }
            
            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if(files.length) {
                    receiptImageInput.files = files;
                    const event = new Event('change');
                    receiptImageInput.dispatchEvent(event);
                }
            });

            // 4. OpenAI Vision API Analysis & Supabase Database Insertion
            async function analyzeReceipt(base64Image) {
                const apiKey = localStorage.getItem('openai_api_key_receipt');
                if (!apiKey) {
                    alert('먼저 상단에 OpenAI API 키를 입력하고 저장해주세요.');
                    return;
                }

                const resultsGrid = document.getElementById('resultsGrid');
                const emptyState = document.getElementById('emptyState');
                const loadingIndicator = document.getElementById('loadingIndicator');
                
                // Show loader, hide grid
                emptyState.style.display = 'none';
                resultsGrid.style.display = 'none';
                loadingIndicator.style.display = 'flex';

                try {
                    const prompt = "영수증 이미지에서 지출 총액 (amount), 날짜 (date 형식: YYYY-MM-DD), 가게이름 (store), 그리고 지출항목을 식비, 교통, 쇼핑, 기타 중 하나로 분류 (category) 해서 JSON 형식으로 추출해줘.\\n\\n" + base64Image;

                    const payload = {
                        model: "gpt-5-nano-2025-08-07",
                        input: prompt,
                        max_output_tokens: 8000
                    };

                    const response = await fetch('https://api.openai.com/v1/responses', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(`API 오류: ${errorData.error?.message || response.statusText}`);
                    }

                    const result = await response.json();
                    
                    // Extract message text according to constraints (Rule 8 & 9)
                    const outputArray = result.data?.output || [];
                    const messageContent = outputArray.find(item => item.type === 'message');
                    
                    if (!messageContent || !messageContent.content || !messageContent.content[0]) {
                        throw new Error('응답에서 메시지를 찾을 수 없습니다.');
                    }
                    
                    const responseText = messageContent.content[0].text;
                    const cleanedJsonStr = responseText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsedData = JSON.parse(cleanedJsonStr);

                    // Insert to Supabase
                    const { data: insertedData, error: dbError } = await supabase
                        .from('expenses')
                        .insert([{
                            amount: parseInt(String(parsedData.amount).replace(/[^0-9]/g, '')) || 0,
                            date: parsedData.date,
                            category: parsedData.category,
                            store: parsedData.store
                        }])
                        .select();

                    if (dbError) throw dbError;

                    // Update UI and fetch the newest list
                    loadingIndicator.style.display = 'none';
                    await fetchExpenses();

                } catch (error) {
                    loadingIndicator.style.display = 'none';
                    resultsGrid.style.display = 'grid';
                    if (resultsGrid.children.length <= 1) emptyState.style.display = 'flex';
                    console.error('Error:', error);
                    alert('처리 중 오류가 발생했습니다: ' + error.message);
                }
            }
            
            // 5. Fetch and Render Results
            async function fetchExpenses() {
                try {
                    const { data, error } = await supabase
                        .from('expenses')
                        .select('*')
                        .order('date', { ascending: false })
                        .order('created_at', { ascending: false });
                        
                    if (error) throw error;
                    
                    const resultsGrid = document.getElementById('resultsGrid');
                    const emptyState = document.getElementById('emptyState');
                    
                    // Clear existing cards, keep emptyState
                    Array.from(resultsGrid.children).forEach(child => {
                        if (child.id !== 'emptyState') {
                            child.remove();
                        }
                    });
                    
                    if (!data || data.length === 0) {
                        emptyState.style.display = 'flex';
                        resultsGrid.style.display = 'grid'; 
                        document.getElementById('itemCount').innerText = '총 0건';
                        return;
                    }
                    
                    emptyState.style.display = 'none';
                    resultsGrid.style.display = 'grid';
                    document.getElementById('itemCount').innerText = `총 ${data.length}건`;
                    
                    data.forEach(expense => {
                        renderCard(
                            expense.store,
                            expense.category,
                            expense.date,
                            [{name: '총액', price: expense.amount.toLocaleString() + '원'}],
                            expense.amount
                        );
                    });
                } catch (error) {
                    console.error('내역 조회 실패:', error);
                }
            }

            function renderCard(shop, category, date, items, total) {
                const template = document.getElementById('cardTemplate');
                const clone = template.content.cloneNode(true);
                
                clone.querySelector('.template-shop-name').textContent = shop || '이름 없음';
                clone.querySelector('.template-category').textContent = category || '기타';
                clone.querySelector('.template-date').innerHTML += ' ' + (date || '');
                clone.querySelector('.template-total').textContent = (total || 0).toLocaleString() + '원';
                
                if (items && items.length > 0) {
                    const itemsContainer = clone.querySelector('.template-items');
                    items.forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'flex justify-between items-center py-1 font-medium';
                        row.innerHTML = `<span class="text-gray-700">${item.name}</span><span class="text-gray-900 tracking-tight">${item.price}</span>`;
                        itemsContainer.appendChild(row);
                    });
                }
                
                document.getElementById('resultsGrid').appendChild(clone);
            }
        });
        
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
